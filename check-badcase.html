<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>badcase检查 - 周期质检辅助工具</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#22c55e',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-primary {
                @apply bg-primary text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 hover:bg-blue-600 hover:shadow-lg transform hover:-translate-y-1;
            }
            .btn-secondary {
                @apply bg-secondary text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 hover:bg-slate-600 hover:shadow-lg transform hover:-translate-y-1;
            }
            .btn-success {
                @apply bg-success text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 hover:bg-green-600 hover:shadow-lg transform hover:-translate-y-1;
            }
            .btn-danger {
                @apply bg-danger text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 hover:bg-red-600 hover:shadow-lg transform hover:-translate-y-1;
            }
            .card {
                @apply bg-white rounded-xl shadow-card p-6 transition-all duration-300 hover:shadow-card-hover;
            }
            .input-file {
                @apply block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-primary file:text-white hover:file:bg-blue-600;
            }
            .input-text {
                @apply block w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent;
            }
            .label {
                @apply block text-sm font-medium text-gray-700 mb-1;
            }
            .link {
                @apply text-primary hover:text-blue-700 hover:underline cursor-pointer transition-colors duration-300;
            }
            .table-container {
                @apply overflow-x-auto max-h-96 overflow-y-auto border border-gray-200 rounded-lg;
            }
            .table {
                @apply min-w-full divide-y divide-gray-200;
            }
            .table th {
                @apply px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider sticky top-0;
            }
            .table td {
                @apply px-6 py-4 whitespace-nowrap text-sm text-gray-500;
            }
            .table tr:nth-child(even) {
                @apply bg-gray-50;
            }
            .step-active {
                @apply bg-primary text-white;
            }
            .step-completed {
                @apply bg-success text-white;
            }
            .step-pending {
                @apply bg-gray-200 text-gray-600;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">badcase筛选</h1>
                    <p class="text-gray-600">筛选周期评测中的badcase</p>
                </div>
                <button id="btn-back" class="btn-secondary">
                    <i class="fa fa-arrow-left mr-2"></i>返回首页
                </button>
            </div>
        </header>

        <!-- 步骤指示器 -->
        <div class="flex justify-between items-center mb-8 max-w-4xl mx-auto">
            <div class="flex flex-col items-center">
                <div id="step-1-circle" class="w-10 h-10 rounded-full flex items-center justify-center step-active mb-2">
                    <span>1</span>
                </div>
                <span class="text-sm font-medium">上传周期文件</span>
            </div>
            <div class="flex-1 h-1 bg-gray-200 mx-2">
                <div id="progress-1-2" class="h-full bg-gray-200" style="width: 0%"></div>
            </div>
            <div class="flex flex-col items-center">
                <div id="step-2-circle" class="w-10 h-10 rounded-full flex items-center justify-center step-pending mb-2">
                    <span>2</span>
                </div>
                <span class="text-sm font-medium">生成链接</span>
            </div>
            <div class="flex-1 h-1 bg-gray-200 mx-2">
                <div id="progress-2-3" class="h-full bg-gray-200" style="width: 0%"></div>
            </div>
            <div class="flex flex-col items-center">
                <div id="step-3-circle" class="w-10 h-10 rounded-full flex items-center justify-center step-pending mb-2">
                    <span>3</span>
                </div>
                <span class="text-sm font-medium">上传评测详情</span>
            </div>
            <div class="flex-1 h-1 bg-gray-200 mx-2">
                <div id="progress-3-4" class="h-full bg-gray-200" style="width: 0%"></div>
            </div>
            <div class="flex flex-col items-center">
                <div id="step-4-circle" class="w-10 h-10 rounded-full flex items-center justify-center step-pending mb-2">
                    <span>4</span>
                </div>
                <span class="text-sm font-medium">筛选badcase</span>
            </div>
        </div>

        <main class="max-w-4xl mx-auto">
            <!-- 步骤1：上传周期文件 -->
            <div id="step-1" class="card mb-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">步骤1：上传周期文件</h2>
                <p class="text-gray-700 mb-4">导出兼职文档中的周期文件，处理得到本周badcase，在场内分配完成badcase检查</p>
                <div class="mb-4">
                    <label for="cycle-file-upload" class="label">选择周期Excel文件</label>
                    <input type="file" id="cycle-file-upload" accept=".xlsx, .xls" class="input-file">
                </div>
                <div class="flex space-x-4">
                    <button id="btn-process-cycle-file" class="btn-primary" disabled>
                        <i class="fa fa-cogs mr-2"></i>文件处理
                    </button>
                </div>
            </div>

            <!-- 步骤2：生成链接 -->
            <div id="step-2" class="card mb-8 hidden">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">步骤2：生成链接</h2>
                <div class="mb-4">
                    <label class="label">生成的链接</label>
                    <div class="flex">
                        <input type="text" id="generated-link" class="input-text flex-1" readonly>
                        <button id="btn-copy-link" class="btn-secondary ml-2 px-4">
                            <i class="fa fa-copy"></i>
                        </button>
                    </div>
                </div>
                <p class="text-gray-700 mb-4">复制链接并打开，点击"导出评测详情"，下载"评测详细统计"文件</p>
            </div>

            <!-- 步骤3：上传评测详情 -->
            <div id="step-3" class="card mb-8 hidden">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">步骤3：上传评测详情</h2>
                <div class="mb-4">
                    <label for="detail-file-upload" class="label">选择评测详细统计文件</label>
                    <input type="file" id="detail-file-upload" accept=".xlsx, .xls" class="input-file">
                </div>
                <div class="flex space-x-4">
                    <button id="btn-filter-badcase" class="btn-danger" disabled>
                        <i class="fa fa-filter mr-2"></i>badcase筛选
                    </button>
                </div>
            </div>

            <!-- 预览区域 -->
            <div id="preview-section" class="card hidden">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">badcase筛选结果</h2>
                <div class="table-container">
                    <table id="preview-table" class="table">
                        <!-- 表格内容将通过JavaScript动态生成 -->
                    </table>
                </div>
                <div class="mt-4 text-right">
                    <button id="btn-download-result" class="btn-success">
                        <i class="fa fa-download mr-2"></i>下载筛选结果
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 返回首页
        document.getElementById('btn-back').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // 步骤控制
        let currentStep = 1;
        let cycleFileData = null;
        let detailFileData = null;
        let badcaseData = null;

        // 显示上传成功提示
        function showUploadSuccess() {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50';
            toast.textContent = '文件上传成功！';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 更新步骤状态
        function updateStep(step) {
            // 重置所有步骤
            for (let i = 1; i <= 4; i++) {
                const circle = document.getElementById(`step-${i}-circle`);
                if (i < step) {
                    circle.className = 'w-10 h-10 rounded-full flex items-center justify-center step-completed mb-2';
                } else if (i === step) {
                    circle.className = 'w-10 h-10 rounded-full flex items-center justify-center step-active mb-2';
                } else {
                    circle.className = 'w-10 h-10 rounded-full flex items-center justify-center step-pending mb-2';
                }
            }

            // 更新进度条
            for (let i = 1; i <= 3; i++) {
                const progress = document.getElementById(`progress-${i}-${i+1}`);
                if (i < step) {
                    progress.className = 'h-full bg-success';
                    progress.style.width = '100%';
                } else {
                    progress.className = 'h-full bg-gray-200';
                    progress.style.width = '0%';
                }
            }

            // 显示/隐藏步骤内容
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            
            if (step >= 1) document.getElementById('step-1').classList.remove('hidden');
            if (step >= 2) document.getElementById('step-2').classList.remove('hidden');
            if (step >= 3) document.getElementById('step-3').classList.remove('hidden');
            
            currentStep = step;
        }

        // 步骤1：处理周期文件
        document.getElementById('cycle-file-upload').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                document.getElementById('btn-process-cycle-file').disabled = false;
                showUploadSuccess();
            }
        });

        document.getElementById('btn-process-cycle-file').addEventListener('click', function() {
            const fileInput = document.getElementById('cycle-file-upload');
            if (!fileInput.files.length) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 将Excel数据转换为JSON
                    const jsonData = XLSX.utils.sheet_to_json(worksheet);
                    
                    // 筛选"子任务顺序"列为"1"的数据
                    cycleFileData = jsonData.filter(row => row['子任务顺序'] === 1 || row['子任务顺序'] === '1');
                    
                    if (cycleFileData.length === 0) {
                        alert('未找到子任务顺序为1的记录');
                        return;
                    }
                    
                    // 提取任务ID并生成链接
                    const taskIds = cycleFileData.map(row => row['任务ID']).filter(id => id);
                    const link = `https://mapi.yuanfudao.com/evaluation/#/evaluation/holepage/statistics?taskIds=[${taskIds.join(',')}]`;
                    
                    // 显示链接
                    document.getElementById('generated-link').value = link;
                    
                    // 进入步骤2
                    updateStep(2);
                    
                } catch (error) {
                    console.error('文件处理错误:', error);
                    alert('文件处理失败，请检查文件格式是否正确');
                }
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        });

        // 步骤2：复制链接
        document.getElementById('btn-copy-link').addEventListener('click', function() {
            const linkInput = document.getElementById('generated-link');
            linkInput.select();
            document.execCommand('copy');
            alert('链接已复制到剪贴板');
            
            // 自动进入步骤3
            updateStep(3);
        });

        // 步骤3：上传评测详情
        document.getElementById('detail-file-upload').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                document.getElementById('btn-filter-badcase').disabled = false;
                showUploadSuccess();
            }
        });

        document.getElementById('btn-filter-badcase').addEventListener('click', function() {
            const fileInput = document.getElementById('detail-file-upload');
            if (!fileInput.files.length) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 将Excel数据转换为JSON
                    detailFileData = XLSX.utils.sheet_to_json(worksheet);
                    
                    // 筛选badcase
                    badcaseData = detailFileData.filter(row => 
                        row['是否AI可批'] === 'AI可批' &&
                        row['作答结果-算法可解评测结果'] === '是' &&
                        row['固定批改-算法可解评测结果'] === '是' &&
                        row['批改情况'] === '错误'
                    );
                    
                    if (badcaseData.length === 0) {
                        alert('未找到符合条件的badcase');
                        return;
                    }
                    
                    // 显示预览
                    displayPreview(badcaseData);
                    
                    // 显示预览区域
                    document.getElementById('preview-section').classList.remove('hidden');
                    
                    // 进入步骤4
                    updateStep(4);
                    
                    // 显示成功提示
                    alert(`badcase筛选成功，共找到 ${badcaseData.length} 条记录`);
                } catch (error) {
                    console.error('文件处理错误:', error);
                    alert('文件处理失败，请检查文件格式是否正确');
                }
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        });

        // 显示预览
        function displayPreview(data) {
            if (!data || data.length === 0) return;

            const table = document.getElementById('preview-table');
            table.innerHTML = '';

            // 创建表头
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            
            // 获取所有列名
            const columns = Object.keys(data[0]);
            
            columns.forEach(column => {
                const th = document.createElement('th');
                th.textContent = column;
                headerRow.appendChild(th);
            });
            
            thead.appendChild(headerRow);
            table.appendChild(thead);

            // 创建表体
            const tbody = document.createElement('tbody');
            
            data.forEach(row => {
                const tr = document.createElement('tr');
                
                columns.forEach(column => {
                    const td = document.createElement('td');
                    td.textContent = row[column] || '';
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            });
            
            table.appendChild(tbody);
        }

        // 下载筛选结果
        document.getElementById('btn-download-result').addEventListener('click', function() {
            if (!badcaseData || badcaseData.length === 0) return;

            try {
                // 创建工作簿
                const workbook = XLSX.utils.book_new();
                
                // 创建工作表
                const worksheet = XLSX.utils.json_to_sheet(badcaseData);
                
                // 将工作表添加到工作簿
                XLSX.utils.book_append_sheet(workbook, worksheet, 'badcase筛选结果');
                
                // 生成Excel文件并下载
                const fileName = 'badcase筛选结果.xlsx';
                XLSX.writeFile(workbook, fileName);
            } catch (error) {
                console.error('文件下载错误:', error);
                alert('文件下载失败');
            }
        });

        // 初始化步骤
        updateStep(1);
    </script>
</body>
</html>
