<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周期评测质检 - 周期质检辅助工具</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#22c55e',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'card-hover': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-primary {
                @apply bg-primary text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 hover:bg-blue-600 hover:shadow-lg transform hover:-translate-y-1;
            }
            .btn-secondary {
                @apply bg-secondary text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 hover:bg-slate-600 hover:shadow-lg transform hover:-translate-y-1;
            }
            .btn-success {
                @apply bg-success text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 hover:bg-green-600 hover:shadow-lg transform hover:-translate-y-1;
            }
            .btn-danger {
                @apply bg-danger text-white px-6 py-3 rounded-lg font-medium transition-all duration-300 hover:bg-red-600 hover:shadow-lg transform hover:-translate-y-1;
            }
            .card {
                @apply bg-white rounded-xl shadow-card p-6 transition-all duration-300 hover:shadow-card-hover;
            }
            .input-file {
                @apply block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-primary file:text-white hover:file:bg-blue-600;
            }
            .input-text {
                @apply block w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent;
            }
            .label {
                @apply block text-sm font-medium text-gray-700 mb-1;
            }
            .link {
                @apply text-primary hover:text-blue-700 hover:underline cursor-pointer transition-colors duration-300;
            }
            .table-container {
                @apply overflow-x-auto max-h-96 overflow-y-auto border border-gray-200 rounded-lg;
            }
            .table {
                @apply min-w-full divide-y divide-gray-200;
            }
            .table th {
                @apply px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider sticky top-0;
            }
            .table td {
                @apply px-6 py-4 whitespace-nowrap text-sm text-gray-500;
            }
            .table tr:nth-child(even) {
                @apply bg-gray-50;
            }
            .range-slider {
                @apply w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer;
            }
            .range-slider::-webkit-slider-thumb {
                @apply appearance-none w-6 h-6 rounded-full bg-primary cursor-pointer;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">周期评测质检</h1>
                    <p class="text-gray-600">随机抽取一定比例任务进行最终质检</p>
                </div>
                <button id="btn-back" class="btn-secondary">
                    <i class="fa fa-arrow-left mr-2"></i>返回首页
                </button>
            </div>
        </header>

        <main class="max-w-4xl mx-auto">
            <div class="card mb-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">操作指南</h2>
                <ol class="list-decimal list-inside space-y-2 text-gray-700">
                    <li>周期评测检查与badcase检查全部完成后，随机抽取一定比例的周期任务进行最后质检</li>
                    <li>上传包含周期任务的Excel文件</li>
                    <li>设置质检比例（0～30%）</li>
                    <li>预览抽取结果并下载</li>
                </ol>
            </div>

            <div class="card mb-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">文件上传与设置</h2>
                <div class="mb-6">
                    <label for="inspection-file-upload" class="label">选择周期Excel文件</label>
                    <input type="file" id="inspection-file-upload" accept=".xlsx, .xls" class="input-file">
                </div>
                
                <div class="mb-6">
                    <div class="flex justify-between items-center mb-2">
                        <label for="inspection-ratio" class="label">质检比例</label>
                        <span id="ratio-value" class="text-sm font-medium text-primary">5%</span>
                    </div>
                    <input type="range" id="inspection-ratio" min="0" max="30" value="5" step="1" class="range-slider">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>0%</span>
                        <span>15%</span>
                        <span>30%</span>
                    </div>
                </div>
                
                <div class="flex space-x-4">
                    <button id="btn-generate-inspection" class="btn-primary" disabled>
                        <i class="fa fa-random mr-2"></i>生成质检任务
                    </button>
                    <button id="btn-download-inspection" class="btn-success" disabled>
                        <i class="fa fa-download mr-2"></i>下载质检任务
                    </button>
                </div>
            </div>

            <div id="inspection-result" class="card hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-gray-800">质检任务抽取结果</h2>
                    <div class="text-sm text-gray-600">
                        共抽取 <span id="selected-count" class="font-medium text-primary">0</span> 条记录
                    </div>
                </div>
                <div class="table-container">
                    <table id="inspection-table" class="table">
                        <!-- 表格内容将通过JavaScript动态生成 -->
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 返回首页
        document.getElementById('btn-back').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        // 质检比例滑块
        const ratioSlider = document.getElementById('inspection-ratio');
        const ratioValue = document.getElementById('ratio-value');
        
        ratioSlider.addEventListener('input', function() {
            ratioValue.textContent = this.value + '%';
        });

        // 文件上传处理
        let uploadedFile = null;
        let inspectionData = null;
        let selectedData = null;

        document.getElementById('inspection-file-upload').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                uploadedFile = e.target.files[0];
                document.getElementById('btn-generate-inspection').disabled = false;
                document.getElementById('btn-download-inspection').disabled = true;
                document.getElementById('inspection-result').classList.add('hidden');
            }
        });

        // 生成质检任务
        document.getElementById('btn-generate-inspection').addEventListener('click', function() {
            if (!uploadedFile) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // 将Excel数据转换为JSON
                    inspectionData = XLSX.utils.sheet_to_json(worksheet);
                    
                    if (!inspectionData || inspectionData.length === 0) {
                        alert('文件中没有数据');
                        return;
                    }
                    
                    // 保留指定列
                    const requiredColumns = ["任务名称", "子任务顺序", "任务ID", "子任务ID","线上学生作业ID", "老师作业ID", "题单ID","未评测页数", "总页数", "总评测数量","任务链接", "负责人", "交付日期","完成情况", "特殊备注", "检查人"];
                    
                    inspectionData = inspectionData.map(row => {
                        const newRow = {};
                        requiredColumns.forEach(col => {
                            newRow[col] = row[col] || '';
                        });
                        
                        // 添加新列
                        newRow["总标签数"] = row["总评测数量"] || 0;
                        newRow["错误数"] = '';
                        newRow["正确率"] = '';
                        newRow["图片/留痕不清导致"] = '';
                        newRow["评测规则导致"] = '';
                        newRow["兼职漏做"] = '';
                        newRow["兼职错做"] = '';
                        newRow["其他问题（问题+数）"] = '';
                        
                        return newRow;
                    });
                    
                    // 获取质检比例
                    const ratio = parseInt(ratioSlider.value) / 100;
                    
                    // 检查是否有"总页数"列
                    if (!inspectionData[0].hasOwnProperty('总页数')) {
                        // 如果没有"总页数"列，则按行随机抽取
                        const totalRows = inspectionData.length;
                        const targetRows = Math.ceil(totalRows * ratio);
                        
                        // 随机打乱数据
                        const shuffledData = [...inspectionData].sort(() => Math.random() - 0.5);
                        
                        // 抽取前targetRows条记录
                        selectedData = shuffledData.slice(0, targetRows);
                    } else {
                        // 如果有"总页数"列，则按总页数比例抽取
                        // 首先计算总页数
                        const totalPages = inspectionData.reduce((sum, row) => sum + (parseInt(row['总页数']) || 0), 0);
                        
                        // 计算需要抽取的页数
                        const targetPages = Math.ceil(totalPages * ratio);
                        
                        // 随机打乱数据
                        const shuffledData = [...inspectionData].sort(() => Math.random() - 0.5);
                        
                        // 累计页数，直到达到目标页数
                        let accumulatedPages = 0;
                        selectedData = [];
                        
                        for (const row of shuffledData) {
                            const rowPages = parseInt(row['总页数']) || 0;
                            selectedData.push(row);
                            accumulatedPages += rowPages;
                            
                            if (accumulatedPages >= targetPages) {
                                break;
                            }
                        }
                    }
                    
                    // 显示结果
                    document.getElementById('selected-count').textContent = selectedData.length;
                    displayInspectionResult(selectedData);
                    document.getElementById('inspection-result').classList.remove('hidden');
                    
                    // 启用下载按钮
                    document.getElementById('btn-download-inspection').disabled = false;
                    
                    // 显示成功提示
                    alert(`质检任务生成成功，共抽取 ${selectedData.length} 条记录`);
                } catch (error) {
                    console.error('文件处理错误:', error);
                    alert('文件处理失败，请检查文件格式是否正确');
                }
            };
            reader.readAsArrayBuffer(uploadedFile);
        });

        // 显示质检结果
        function displayInspectionResult(data) {
            if (!data || data.length === 0) return;

            const table = document.getElementById('inspection-table');
            table.innerHTML = '';

            // 创建表头
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            
            // 获取所有列名
            const columns = Object.keys(data[0]);
            
            columns.forEach(column => {
                const th = document.createElement('th');
                th.textContent = column;
                headerRow.appendChild(th);
            });
            
            thead.appendChild(headerRow);
            table.appendChild(thead);

            // 创建表体
            const tbody = document.createElement('tbody');
            
            data.forEach(row => {
                const tr = document.createElement('tr');
                
                columns.forEach(column => {
                    const td = document.createElement('td');
                    td.textContent = row[column] || '';
                    tr.appendChild(td);
                });
                
                tbody.appendChild(tr);
            });
            
            table.appendChild(tbody);
        }

        // 下载质检任务
        document.getElementById('btn-download-inspection').addEventListener('click', function() {
            if (!selectedData || selectedData.length === 0) return;

            try {
                // 创建工作簿
                const workbook = XLSX.utils.book_new();
                
                // 创建工作表
                const worksheet = XLSX.utils.json_to_sheet(selectedData);
                
                // 获取列索引
                const columns = Object.keys(selectedData[0]);
                const totalTagsCol = columns.indexOf("总标签数") + 1;
                const errorCountCol = columns.indexOf("错误数") + 1;
                const accuracyCol = columns.indexOf("正确率") + 1;
                
                // 为每一行添加正确率公式
                for (let i = 2; i <= selectedData.length + 1; i++) { // 从第2行开始（第1行是表头）
                    const cellAddress = XLSX.utils.encode_cell({r: i-1, c: accuracyCol-1});
                    worksheet[cellAddress] = {
                        t: 'n',
                        f: `1-${XLSX.utils.encode_cell({r: i-1, c: errorCountCol-1})}/${XLSX.utils.encode_cell({r: i-1, c: totalTagsCol-1})}`,
                        z: '0.00%' // 设置为保留两位小数的百分比格式
                    };
                }
                
                // 将工作表添加到工作簿
                XLSX.utils.book_append_sheet(workbook, worksheet, '质检任务');
                
                // 生成Excel文件并下载
                const fileName = `质检任务_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`;
                XLSX.writeFile(workbook, fileName);
            } catch (error) {
                console.error('文件下载错误:', error);
                alert('文件下载失败');
            }
        });
    </script>
</body>
</html>
